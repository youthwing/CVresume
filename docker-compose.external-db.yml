services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-21}
        JAVA_IMAGE: ${JAVA_IMAGE:-eclipse-temurin:21-jre-jammy}
    container_name: cvresume-backend
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_URL: ${MYSQL_URL:-jdbc:mysql://127.0.0.1:3306/crseume?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-crseume_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_user_password}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
      SERVER_ADDRESS: 127.0.0.1
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SSL_ENABLE: ${MAIL_SSL_ENABLE:-true}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-false}
      AUTH_MAIL_FROM: ${AUTH_MAIL_FROM:-}
      AUTH_MAIL_FROM_NAME: ${AUTH_MAIL_FROM_NAME:-CVResume 简历救兵}
      APP_SEED_USERS_ENABLED: ${APP_SEED_USERS_ENABLED:-false}
      APP_DEMO_USER_EMAIL: ${APP_DEMO_USER_EMAIL:-demo@crseume.local}
      APP_DEMO_USER_PASSWORD: ${APP_DEMO_USER_PASSWORD:-}
      APP_SHOWCASE_USER_EMAIL: ${APP_SHOWCASE_USER_EMAIL:-seed@crseume.local}
      APP_SHOWCASE_USER_PASSWORD: ${APP_SHOWCASE_USER_PASSWORD:-}
      APP_ADMIN_USER_EMAIL: ${APP_ADMIN_USER_EMAIL:-admin@crseume.local}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      LLM_ENABLED: ${LLM_ENABLED:-true}
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        SKIP_BUILD_VALIDATION: ${SKIP_BUILD_VALIDATION:-true}
    container_name: cvresume-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
